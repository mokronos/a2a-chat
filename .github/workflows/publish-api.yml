name: Publish api

on:
  push:
    tags:
      - "api-v*"

# Trusted publishing (OIDC) — no npm token needed.
# Configure the trusted publisher for @mokronos/a2a-chat-api on npmjs.com:
#   repo: <owner>/a2a-chat, workflow filename: publish-api.yml
permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      # Trusted publishing requires npm >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#api-v}"
          PKG_VERSION="$(jq -r .version packages/api/package.json)"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/api/package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:api

      - name: Publish
        run: npm publish
        working-directory: packages/api
